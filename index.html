<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- pinch-zoom intentionally ENABLED (a11y / WCAG 1.4.4): she can zoom the dense 50-chart;
       iOS largely ignores a scale lock anyway. (Reversed the earlier maximum-scale=1.0 lock, 2026-06-28.) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Math Hero</title>
  <meta name="description" content="Math Hero — a friendly daily math game that teaches addition as visible patterns." />

  <!-- PWA: installable, offline, full-screen on the home screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0e1430" />

  <!-- iOS Safari ignores parts of the manifest, so it needs these too -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Math Hero" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    The whole app is ONE page. We show/hide "screens" by toggling the .is-active
    class. app.js drives which screen is visible. The BOARD is the new home.
    NOTE: the play/reward element IDs below are a HARD contract with app.js —
    don't rename them.
  -->
  <main id="app">

    <!-- ============ BOARD (home) ============ -->
    <section class="screen is-active" data-screen="board">
      <header class="board-top">
        <h1 class="logo" id="logo">⭐ Math Hero</h1>
        <!-- coin jar: a fill-to-goal meter, not an open counter ("fill it to wake the shop") -->
        <div class="jar" id="jar" aria-label="Coin jar">
          <div class="jar-fill" id="jar-fill"></div>
          <span class="jar-amt">🪙 <span id="coin-amt">0</span></span>
        </div>
      </header>

      <p class="season-line" id="season-line">Season 1</p>

      <!-- app.js renders the tiles here (live / mastered / next-up / locked-pips) -->
      <div class="tiles" id="tiles" aria-label="Skills"></div>

      <div class="board-foot">
        <div class="avatar-box" id="avatar-box" aria-hidden="true"></div>
        <p class="shop-teaser" id="shop-teaser">👗 Shop opening soon!</p>
      </div>
    </section>

    <!-- ============ PLAY SCREEN ============ -->
    <section class="screen" data-screen="play">
      <div class="dots" id="dots" aria-label="Round progress"></div>
      <p class="prompt" id="prompt">23 + 10 = ?</p>
      <div class="visual" id="visual" aria-hidden="true"></div>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback"></p>
      <div class="play-tools">
        <button class="btn btn-hint" id="hint-btn">👀 Show me</button>
        <button class="btn btn-ghost" id="replay-btn" title="Hear it again">🔊</button>
      </div>
    </section>

    <!-- ============ REWARD SCREEN ============ -->
    <section class="screen" data-screen="reward">
      <div class="confetti" id="confetti" aria-hidden="true"></div>
      <h2 class="reward-title" id="reward-title">You did it! 🎉</h2>
      <p class="stars" id="reward-stars">⭐⭐⭐⭐⭐</p>
      <p class="reward-coins" id="reward-coins"></p>
      <p class="reward-line" id="reward-speed"></p>
      <button class="btn btn-big btn-go" id="home-btn">Back to board 🏠</button>
    </section>

  </main>

  <!-- Hidden parent report (long-press the ⭐ logo ~2s). On-device only. -->
  <div class="panel" id="parent-panel" hidden>
    <div class="panel-card">
      <h2 class="panel-title">Parent report</h2>
      <div class="panel-rows" id="panel-rows"></div>
      <div class="panel-actions">
        <button class="btn btn-hint" id="panel-unlock">🔓 Unlock next skill</button>
        <button class="btn btn-ghost" id="panel-close">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
